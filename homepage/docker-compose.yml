networks:
  proxy:
    name: proxy

services:

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "homer.enable=true"
      - "homer.name=Traefik"
      - "homer.subtitle=Reverse proxy"
      - "homer.url=http://traefik.localhost"
      - "homer.logo=https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/traefik.png"
      - "homer.tag=proxy"
      - "homer.group=Infrastructure"

  homer:
    image: b4bz/homer:latest
    container_name: homer
    restart: unless-stopped
    ports:
      - "52000:8080"
    volumes:
      - ./config:/www/assets
    environment:
      - INIT_ASSETS=0
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homer.rule=Host(`homer.localhost`)"
      - "traefik.http.routers.homer.entrypoints=web"
      - "traefik.http.services.homer.loadbalancer.server.port=8080"

  homer-manager:
    build: ./homer-manager
    container_name: homer-manager
    restart: unless-stopped
    ports:
      - "52001:5000"
    volumes:
      - ./config:/config
      - ./homer-manager/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMER_CONFIG=/config/config.yml
      - DATA_PATH=/data
      - SYNC_INTERVAL=60
    networks:
      - proxy
    depends_on:
      - homer
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homer-manager.rule=Host(`manager.localhost`)"
      - "traefik.http.routers.homer-manager.entrypoints=web"
      - "traefik.http.services.homer-manager.loadbalancer.server.port=5000"
      - "homer.enable=true"
      - "homer.name=Homer Manager"
      - "homer.subtitle=Add or remove dashboard links"
      - "homer.url=http://localhost:52001"
      - "homer.logo=https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/homer.png"
      - "homer.tag=admin"
      - "homer.group=Tools"
