networks:
  frontend:
    external: true

services:

  homer:
    image: b4bz/homer:latest
    container_name: homer
    restart: unless-stopped
    ports:
      - "52000:8080"
    volumes:
      - ./config:/www/assets
    environment:
      - INIT_ASSETS=0
    networks:
      - frontend
    labels:
      - "traefik.enable=true"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.homer.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homer.entrypoints=web"
      - "traefik.http.routers.homer.middlewares=redirect-https"
      # HTTPS
      - "traefik.http.routers.homer-secure.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homer-secure.entrypoints=websecure"
      - "traefik.http.routers.homer-secure.tls=true"
      - "traefik.http.routers.homer-secure.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.routers.homer-secure.priority=1"
      - "traefik.http.services.homer.loadbalancer.server.port=8080"
      # Middleware redirect (défini une fois, réutilisé par tous)
      - "traefik.http.middlewares.redirect-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-https.redirectscheme.permanent=true"

  homer-manager:
    build: ./homer-manager
    container_name: homer-manager
    restart: unless-stopped
    ports:
      - "52001:5000"
    volumes:
      - ./config:/config
      - ./homer-manager/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HOMER_TEMPLATE=/config/config.template.yml
      - HOMER_CONFIG=/config/config.yml
      - DATA_PATH=/data
      - SYNC_INTERVAL=60
      - DOMAIN=${DOMAIN}
      - MANAGER_SUBDOMAIN=${MANAGER_SUBDOMAIN}
      - MANAGER_USER=${MANAGER_USER}
      - MANAGER_PASSWORD=${MANAGER_PASSWORD}
      - SECRET_KEY=${SECRET_KEY}
    networks:
      - frontend
    depends_on:
      - homer
    labels:
      - "traefik.enable=true"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.homer-manager.rule=Host(`${MANAGER_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.homer-manager.entrypoints=web"
      - "traefik.http.routers.homer-manager.middlewares=redirect-https"
      # HTTPS
      - "traefik.http.routers.homer-manager-secure.rule=Host(`${MANAGER_SUBDOMAIN}.${DOMAIN}`)"
      - "traefik.http.routers.homer-manager-secure.entrypoints=websecure"
      - "traefik.http.routers.homer-manager-secure.tls=true"
      - "traefik.http.routers.homer-manager-secure.tls.certresolver=${CERT_RESOLVER}"
      - "traefik.http.services.homer-manager.loadbalancer.server.port=5000"
